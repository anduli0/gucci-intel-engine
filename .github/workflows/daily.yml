name: daily-intelligence

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = 08:00 KST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 170
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run daily pipeline
        run: bash scripts/cloud-daily.sh

      - name: Commit data + site (Pages serves this repo's /docs)
        run: |
          rsync -a --delete site_out/ docs/
          git config user.name "gucci-intel-bot"
          git config user.email "minkyu494@gmail.com"
          git add data docs
          git commit -m "daily cycle $(date +'%F %H:%M')" || echo "no changes"
          git pull --rebase origin main || true
          git push || echo "push skipped"
