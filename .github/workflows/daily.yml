name: daily-intelligence

on:
  schedule:
    - cron: '0 23 * * *'   # 23:00 UTC = 08:00 KST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  intelligence:
    runs-on: ubuntu-latest
    timeout-minutes: 170
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run daily pipeline
        run: bash scripts/cloud-daily.sh

      - name: Commit data state back to this repo
        run: |
          git config user.name "gucci-intel-bot"
          git config user.email "minkyu494@gmail.com"
          git add data
          git commit -m "data: $(date +'%F %H:%M') daily cycle" || echo "no changes"
          git pull --rebase origin main || true
          git push || echo "push skipped"

      - name: Publish site to gucci-intel-site (fixed URL)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone --depth 1 "https://x-access-token:${GH_PAT}@github.com/anduli0/gucci-intel-site.git" site_repo
          rsync -a --delete --exclude .git site_out/ site_repo/
          cd site_repo
          git config user.name "gucci-intel-bot"
          git config user.email "minkyu494@gmail.com"
          git add -A
          git commit -m "cloud update $(date +'%F %H:%M')" || echo "no site changes"
          git push
